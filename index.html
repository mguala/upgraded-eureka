<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartones Brillantes - MTG Store</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🃏</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <!-- Top Navigation -->
  <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fs-5 fw-bold" href="#">🃏 Cartones Brillantes</a>
      <div class="d-flex align-items-center gap-3">
        <div class="text-white d-none d-sm-block">
          <small>Artículos: <span id="cart-count" class="badge bg-primary">0</span></small>
          <br>
          <small>Total: <span id="cart-total" class="badge bg-success">0 CLP</span></small>
        </div>
        <button id="view-cart-btn" class="btn btn-primary btn-sm">
          🛒 Carrito
        </button>
      </div>
    </div>
  </nav>

  <!-- Search Bar -->
  <div class="bg-white py-3 border-bottom">
    <div class="container-fluid">
      <form class="d-flex gap-2" onsubmit="return false;">
        <input type="text" id="search-input" class="form-control" placeholder="Buscar por nombre, tipo o color...">
        <button id="search-btn" class="btn btn-outline-secondary" type="button">Buscar</button>
      </form>
    </div>
  </div>

  <!-- Filters Section -->
  <div class="bg-light py-3 border-bottom">
    <div class="container-fluid">
      <div class="row align-items-center g-3">
        <div class="col-auto">
          <label class="text-muted small">Categorías:</label>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-sm btn-outline-primary active filter-type" data-type="all">Todas</button>
            <button class="btn btn-sm btn-outline-primary filter-type" data-type="creature">🐉 Criaturas</button>
            <button class="btn btn-sm btn-outline-primary filter-type" data-type="instant">⚡ Instantáneos</button>
            <button class="btn btn-sm btn-outline-primary filter-type" data-type="sorcery">🔮 Hechizos</button>
            <button class="btn btn-sm btn-outline-primary filter-type" data-type="enchantment">✨ Encantamientos</button>
            <button class="btn btn-sm btn-outline-primary filter-type" data-type="artifact">⚙️ Artefactos</button>
            <button class="btn btn-sm btn-outline-primary filter-type" data-type="planeswalker">👤 Planeswalkers</button>
          </div>
        </div>
        <div class="col-auto">
          <label class="text-muted small">Colores:</label>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-sm btn-outline-primary active filter-color" data-color="all">Todos</button>
            <button class="btn btn-sm btn-outline-primary filter-color" data-color="white">⚪ Blanco</button>
            <button class="btn btn-sm btn-outline-primary filter-color" data-color="blue">🔵 Azul</button>
            <button class="btn btn-sm btn-outline-primary filter-color" data-color="black">⚫ Negro</button>
            <button class="btn btn-sm btn-outline-primary filter-color" data-color="red">🔴 Rojo</button>
            <button class="btn btn-sm btn-outline-primary filter-color" data-color="green">🟢 Verde</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Products Section -->
  <main class="container-fluid py-5">
    <div id="cards-container" class="row g-4"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-light border-top mt-5 py-4">
    <div class="container-fluid text-center text-muted">
      <p class="mb-0">🃏 Cartones Brillantes TCG - Tu destino para singles de Magic: The Gathering</p>
      <small>Datos de cartas proporcionados por Scryfall</small>
    </div>
  </footer>

  <!-- Cart Modal -->
  <div id="cart-modal" class="modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header border-bottom">
          <h5 class="modal-title">🛒 Carrito de Compras</h5>
          <button type="button" class="btn-close" id="close-cart-btn"></button>
        </div>
        <div class="modal-body">
          <div id="cart-items"></div>
        </div>
        <div class="modal-footer border-top">
          <button type="button" class="btn btn-secondary" id="clear-cart-btn">Vaciar</button>
          <button type="button" class="btn btn-danger" id="checkout-btn">Finalizar Compra</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Card Detail Modal -->
  <div id="card-detail-modal" class="modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header border-bottom">
          <button type="button" class="btn-close" id="close-card-detail-btn"></button>
        </div>
        <div class="modal-body">
          <div id="card-detail-content"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
